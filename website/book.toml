[book]
title = "Flowcat"
description = "A native-Rust runtime for real-time voice agents — built to run on your own infrastructure."
authors = ["AreevAI"]
language = "en"
src = "src"

# The page sources under `src/` are thin wrappers that {{#include}} the
# canonical Markdown from the repo root, so the root files remain the single
# source of truth. See website/README.md.

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/AreevAI/flowcat"
git-repository-icon = "fa-github"
no-section-label = true

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 20
