# Flowcat reproducible benchmark — one command on a clean VM:
#   docker compose -f bench/compose.yml up --build
#
# Builds the image (Rust + pipecat) and runs the full Rust-vs-pipecat sweep,
# printing the comparison tables to the logs. The container exits when done.
services:
  flowcat-bench:
    build:
      context: ..                 # repo root (so it can COPY bench-rs/, bench/, and ./pipecat/)
      dockerfile: bench/Dockerfile
    image: flowcat-bench:latest
    init: true
    network_mode: host               # loopback load-gen↔SUT, no NAT overhead
    environment:
      SECS: "10"
      FPS: "50"
      # SWEEP: "10 25 50 100 250 500 1000 2000"
      # LOADGEN_CORES: "4"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
