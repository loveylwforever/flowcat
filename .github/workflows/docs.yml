# Build the mdBook docs site (website/) and (optionally) deploy it to GitHub Pages.
#
# The `build` job always runs and verifies the docs compile on every push.
#
# Publishing is GATED so the run stays green before Pages is available — GitHub
# Pages needs a PUBLIC repo, or a plan that supports Pages on private repos.
# To turn publishing on, once Pages is available for this repo:
#   1. Settings → Pages → Build and deployment → Source: "GitHub Actions".
#   2. Settings → Secrets and variables → Actions → Variables →
#      add a repository variable  PUBLISH_DOCS = true
# Until PUBLISH_DOCS is "true", the `deploy` job is skipped (run stays green).
name: docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - "*.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; don't cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.4.40"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -sSL "$url" | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: mdbook build website

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/book

  deploy:
    needs: build
    # Skipped (run stays green) until Pages is available and PUBLISH_DOCS=true.
    if: ${{ vars.PUBLISH_DOCS == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
